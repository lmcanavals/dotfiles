<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
	<match target="pattern">
		<test qual="any" name="family"><string>sans-serif</string></test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Electrolize</string>
			<string>Symbols Nerd Font</string>
			<string>Font Awesome 7 Free</string>
			<string>Font Awesome 5 Free</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>serif</string></test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Caladea</string>
			<string>Symbols Nerd Font</string>
			<string>Font Awesome 7 Free</string>
			<string>Font Awesome 5 Free</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>monospace</string></test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Iosevka</string>
			<string>Iosevka Slab</string>
			<string>UbuntuMono Nerd Font</string>
			<string>Monofur Nerd Font</string>
			<string>Symbols Nerd Font Mono</string>
			<string>Font Awesome 7 Free</string>
			<string>Font Awesome 5 Free</string>
		</edit>
	</match>

	<match target="font">
		<edit name="hinting" mode="assign"><bool>true</bool></edit>
		<edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
		<edit name="rgba" mode="assign"><const>rgb</const></edit>
		<edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
	</match>

	<match target="font">
		<test name="family" qual="any" compare="contains"><string>Iosevka</string></test>
		<edit name="fontfeatures" mode="append">
			<string>dlig on</string>
			<string>ss12 on</string>
		</edit>
	</match>

</fontconfig>
